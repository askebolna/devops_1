services:
  backend:
    build: ./backend
    image: me_backend:1.0
    container_name: app_backend
    restart: unless-stopped
    environment: 
      - PORT=${BACKEND_PORT}
    networks: 
      - app_network
    healthcheck:
      test: ["CMD", "python3", "-c", 
        "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  nginx:
    build: ./nginx
    image: me_nginx:1.0
    container_name: app_nginx
    restart: unless-stopped
    ports:
      - ${NGINX_PORT}:80
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80/"] 
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  app_network:
    driver: bridge
